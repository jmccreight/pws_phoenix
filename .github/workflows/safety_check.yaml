name: Safety Check

on:
  schedule:
    # Run weekly on Mondays at midnight UTC
    - cron: "0 0 * * 1"
  pull_request:
    paths:
      - "environment.yml"
      - "environment_w_jupyter.yml"
      - "pyproject.toml"
  workflow_dispatch: # Allow manual triggering

jobs:
  safety-check:
    name: Check for vulnerabilities
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment_w_jupyter.yml

      - name: Run safety check
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          ./.github/scripts/safety_check.sh

      - name: Upload safety report as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: safety-report
          path: |
            /tmp/conda_requirements_*.txt
            /tmp/pip_requirements_*.txt
          retention-days: 30
